name: Master CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  # Run all sub-workflows in parallel
  backend:
    uses: ./.github/workflows/backend.yml
    secrets: inherit

  dashboard:
    uses: ./.github/workflows/dashboard.yml
    secrets: inherit

  landing:
    uses: ./.github/workflows/landing.yml
    secrets: inherit

  cli:
    uses: ./.github/workflows/cli.yml
    secrets: inherit

  contract:
    uses: ./.github/workflows/contract.yml
    secrets: inherit

  all-checks-passed:
    name: Final Summary Gate
    needs: [backend, dashboard, landing, cli, contract]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Status Summary Check
        run: |
          BACKEND="${{ needs.backend.result }}"
          DASHBOARD="${{ needs.dashboard.result }}"
          LANDING="${{ needs.landing.result }}"
          CLI="${{ needs.cli.result }}"
          CONTRACT="${{ needs.contract.result }}"

          echo "Layer Status Summary:"
          echo "- Backend: $BACKEND"
          echo "- Dashboard: $DASHBOARD"
          echo "- Landing Page: $LANDING"
          echo "- CLI Tool: $CLI"
          echo "- Smart Contract: $CONTRACT"

          if [ "$BACKEND" != "success" ] || [ "$DASHBOARD" != "success" ] || [ "$LANDING" != "success" ] || [ "$CLI" != "success" ] || [ "$CONTRACT" != "success" ]; then
            echo "CI PIPELINE FAILED IN ONE OR MORE LAYERS"
            exit 1
          fi
          echo "ALL CHECKS PASSED ✅"

      - name: PR Summary Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              backend: "${{ needs.backend.result }}",
              dashboard: "${{ needs.dashboard.result }}",
              landing: "${{ needs.landing.result }}",
              cli: "${{ needs.cli.result }}",
              contract: "${{ needs.contract.result }}"
            };
            const icons = (res) => res === 'success' ? '✅' : '❌';
            const body = `### SipHeron VDR — CI/CD Summary
            | Layer | Status |
            | :--- | :--- |
            | **Backend (Railway)** | ${icons(results.backend)} ${results.backend} |
            | **Dashboard (Vercel)** | ${icons(results.dashboard)} ${results.dashboard} |
            | **Landing Page (Vercel)** | ${icons(results.landing)} ${results.landing} |
            | **CLI (NPM)** | ${icons(results.cli)} ${results.cli} |
            | **Smart Contract (Solana)** | ${icons(results.contract)} ${results.contract} |
            
            **Build Result:** ${Object.values(results).every(r => r === 'success') ? 'SUCCESS' : 'FAILURE'}
            **Triggered By:** @${context.actor}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });