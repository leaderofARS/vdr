name: Smart Contract CI

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
  pull_request:
    branches: [main]
    paths:
      - 'programs/**'

env:
  SOLANA_VERSION: '1.18.22'
  ANCHOR_VERSION: '0.29.0'

jobs:
  build:
    name: Anchor Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Solana/Anchor
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: solana-${{ runner.os }}-v1-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
      - name: Install Anchor CLI
        run: |
          if ! command -v anchor &> /dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked
          fi
          anchor --version
      - name: Build Smart Contract
        run: anchor build
      - name: Verify IDL Generation
        run: |
          if [ ! -f target/idl/vdr_contract.json ]; then
            echo "CRITICAL: IDL not generated at target/idl/vdr_contract.json"
            exit 1
          fi

  test:
    name: Contract Verification
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Verify Build Success
        run: echo "Build verified in previous stage."
