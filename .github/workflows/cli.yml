name: CLI CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'cli/**'
  pull_request:
    branches: [main]
    paths:
      - 'cli/**'

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/vdr-cli
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cli/vdr-cli/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Lint
        run: npx eslint src/ --ext .js

  security:
    name: Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/vdr-cli
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: Audit Vulnerabilities
        run: npm audit --audit-level=high

  test:
    name: CLI Commands Verification
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/vdr-cli
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Dependencies
        run: npm ci
      - name: Verify Version
        run: node src/index.js --version
      - name: Verify Help Global
        run: node src/index.js --help
      - name: Verify Login Command
        run: node src/index.js login --help
      - name: Verify Anchor Command
        run: node src/index.js anchor --help
      - name: Verify Revoke Command
        run: node src/index.js revoke --help

  publish:
    name: NPM Publish
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    if: startsWith(github.ref, 'refs/tags/v')
    defaults:
      run:
        working-directory: cli/vdr-cli
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install Dependencies
        run: npm ci
      - name: Publish To NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
