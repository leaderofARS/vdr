name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/api-server/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Lint
        run: npx eslint src/ --ext .js

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vdr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend/api-server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/api-server/package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Setup Test Environment
        run: |
          cp .env.example .env.test
          sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgresql://postgres:postgres@localhost:5432/vdr_test|' .env.test
          sed -i 's|REDIS_URL=.*|REDIS_URL=redis://localhost:6379|' .env.test
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env.test
          echo "NODE_ENV=test" >> .env.test
      - name: Prisma Migrate Deploy
        run: npx prisma migrate deploy
      - name: Run Tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vdr_test
          REDIS_URL: redis://localhost:6379
        run: npm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/api-server
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: npm ci
      - name: NPM Audit
        run: npm audit --audit-level=high
      - name: Secret Leak Check
        run: |
          SEARCH_TERMS="WALLET_PRIVATE_KEY\|password123\|secret123"
          if grep -r "$SEARCH_TERMS" src/; then
            echo "CRITICAL: Hardcoded secrets found in source code."
            exit 1
          fi

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    defaults:
      run:
        working-directory: backend/api-server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install (Production only)
        run: npm ci --omit=dev
      - name: Prisma Generate
        run: npx prisma generate
      - name: Verify Documentation
        run: |
          if [ ! -f .env.example ]; then
            echo "Missing .env.example for infrastructure deployment."
            exit 1
          fi

  deploy:
    name: Railway Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Railway Redeploy
        run: |
          curl -X POST https://backboard.railway.app/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -d '{"query":"mutation redeploy($serviceId: String!) { serviceRedeploy(serviceId: $serviceId) }", "variables": {"serviceId": "${{ secrets.RAILWAY_SERVICE_ID }}"} }'
      - name: Post-Deploy Health Check
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 60
          curl --fail --retry 3 https://api.sipheron.com/health || exit 1
