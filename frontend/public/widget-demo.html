<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SipHeron VDR — Widget Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #020208;
      color: #F0F0FF;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #8888AA; font-size: 14px; margin-bottom: 40px; }
    h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px;
         color: #6C63FF; text-transform: uppercase; letter-spacing: 0.05em; }
    .section { margin-bottom: 40px; }
    code {
      background: #0D0D1A;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 16px;
      display: block;
      font-size: 13px;
      color: #4ECDC4;
      margin-bottom: 20px;
      white-space: pre;
      overflow-x: auto;
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>SipHeron VDR Widget</h1>
    <p class="subtitle">
      Embeddable document verification widget for any website
    </p>

    <div class="section">
      <h2>Dark Theme (default)</h2>
      <div
        data-sipheron-widget
        data-hash="a3f4b2c1d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5"
        data-theme="dark"
      ></div>
    </div>

    <div class="section">
      <h2>Light Theme</h2>
      <div
        data-sipheron-widget
        data-hash="a3f4b2c1d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5"
        data-theme="light"
      ></div>
    </div>

    <div class="section">
      <h2>Embed Code</h2>
      <code>&lt;div
  data-sipheron-widget
  data-hash="YOUR_SHA256_HASH_HERE"
  data-theme="dark"
&gt;&lt;/div&gt;
&lt;script src="https://app.sipheron.com/widget.js"&gt;&lt;/script&gt;</code>
    </div>
  </div>

  <script src="/widget.js"></script>
</body>
</html>
