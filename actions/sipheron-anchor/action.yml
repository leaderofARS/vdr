name: 'SipHeron VDR Anchor'
description: 'Cryptographically hash your release binaries and anchor them to the Solana blockchain.'
author: 'SipHeron'

branding:
  icon: 'anchor'
  color: 'purple'

inputs:
  directory:
    description: 'The directory path containing the build artifacts/binaries to anchor'
    required: true
    default: './dist'
  api_key:
    description: 'Your SipHeron API Key (Keep secure in GitHub Secrets)'
    required: true
  network:
    description: 'SipHeron Network (localnet, devnet, mainnet)'
    required: false
    default: 'devnet'
  api_url:
    description: 'Custom SipHeron API URL if self-hosting the backend'
    required: false
    default: 'https://api.sipheron.com'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install SipHeron CLI Dependencies
      shell: bash
      run: |
        echo "Installing SipHeron VDR CLI dependencies..."
        cd ${{ github.workspace }}/cli/vdr-cli
        npm install
        echo "${{ github.workspace }}/cli/vdr-cli/bin" >> $GITHUB_PATH
        echo "CLI dependencies installed successfully."

    - name: Configure SipHeron Credentials
      shell: bash
      env:
        SIPHERON_API_KEY: ${{ inputs.api_key }}
      run: |
        echo "Configuring SipHeron CLI..."
        node ${{ github.workspace }}/cli/vdr-cli/src/index.js config set apiUrl "${{ inputs.api_url }}"
        node ${{ github.workspace }}/cli/vdr-cli/src/index.js config set network "${{ inputs.network }}"

    - name: Stage Build Artifacts
      shell: bash
      run: |
        echo "Staging binaries from directory: ${{ inputs.directory }}"

        # Ensure directory exists
        if [ ! -d "${{ inputs.directory }}" ]; then
          echo "::error::Directory '${{ inputs.directory }}' not found."
          exit 1
        fi

        # Recursively find all files and stage them
        find "${{ inputs.directory }}" -type f -exec \
          node ${{ github.workspace }}/cli/vdr-cli/src/index.js stage {} \;

        node ${{ github.workspace }}/cli/vdr-cli/src/index.js status

    - name: Anchor Hashes to Solana
      shell: bash
      env:
        SIPHERON_API_KEY: ${{ inputs.api_key }}
      run: |
        echo "Anchoring staged hashes to the VDR Protocol..."
        node ${{ github.workspace }}/cli/vdr-cli/src/index.js anchor

        echo "::notice::Successfully anchored release binaries to the SipHeron registry!"